<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT 溫濕度動態儀表板</title>
    <!-- 引入 Highcharts -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <!-- 引入 Bootstrap 讓 UI 好看一點 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-container { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-container { height: 400px; margin-top: 30px; }
        .control-panel { background: #eef2f3; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 1.1em; padding: 10px 20px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h2 class="text-center mb-4">🌡️ 智慧 IoT 溫濕度即時監控</h2>

    <div class="control-panel">
        <div>
            <label for="dataSource" class="form-label fw-bold">🔌 選擇資料來源：</label>
            <select id="dataSource" class="form-select w-auto d-inline-block">
                <option value="esp32" selected>📡 ESP32 真實感測器 (每 2 秒)</option>
                <option value="simulator">💻 自動模擬資料 (每 1 秒)</option>
            </select>
        </div>
        <div>
            <span class="badge bg-success status-badge" id="connStatus">連線正常 / 更新中</span>
        </div>
    </div>

    <div id="container" class="chart-container"></div>
</div>

<script>
    let chart;            // Highcharts 實例
    let currentSource = document.getElementById("dataSource").value;
    let fetchInterval;    
    let lastTimestamp = ""; // 記錄最後一筆資料時間戳，避免重複畫相同的點

    // 建立 Highcharts 圖表
    function initChart() {
        chart = Highcharts.chart('container', {
            chart: {
                type: 'spline',
                animation: Highcharts.svg, // 使用 SVG 動畫
                marginRight: 10
            },
            title: { text: '溫濕度即時曲線圖' },
            xAxis: {
                type: 'datetime',
                tickPixelInterval: 150
            },
            yAxis: [{
                title: { text: '溫度 (°C)' },
                min: 15, max: 45
            }, {
                title: { text: '濕度 (%)' },
                opposite: true,
                min: 30, max: 80
            }],
            tooltip: {
                shared: true,
                xDateFormat: '%Y-%m-%d %H:%M:%S'
            },
            legend: { enabled: true },
            exporting: { enabled: false },
            series: [{
                name: '溫度',
                yAxis: 0,
                color: '#FF5733',
                data: []
            }, {
                name: '濕度',
                yAxis: 1,
                color: '#3393FF',
                data: []
            }]
        });
    }

    // 將字串時間戳轉換為 JS 的 Timestamp (考慮台灣時區 UTF-8 解析)
    function parseTimestamp(timeStr) {
        // SQL timestamp 通常為: '2023-10-25 10:15:30'
        return new Date(timeStr).getTime();  
    }

    // 首次載入歷史資料 (最新 30 筆)
    async function loadInitialData() {
        try {
            const response = await fetch(`http://localhost:5000/api/data?source=${currentSource}`);
            const json = await response.json();
            
            if (json.status === 'success' && json.data.length > 0) {
                const tempData = [];
                const humidData = [];
                
                json.data.forEach(row => {
                    const time = parseTimestamp(row.timestamp);
                    tempData.push([time, parseFloat(row.temperature)]);
                    humidData.push([time, parseFloat(row.humidity)]);
                });
                
                // 記錄最後一筆的時間
                lastTimestamp = json.data[json.data.length - 1].timestamp;

                // 設定給圖表
                chart.series[0].setData(tempData, false);
                chart.series[1].setData(humidData, false);
                chart.redraw();
                document.getElementById('connStatus').className = "badge bg-success status-badge";
                document.getElementById('connStatus').innerText = "連線正常 / 更新中";
            }
        } catch (error) {
            console.error("載入初始資料錯誤: ", error);
            document.getElementById('connStatus').className = "badge bg-danger status-badge";
            document.getElementById('connStatus').innerText = "API 連線失敗";
        }
    }

    // 定期抓取最新一筆資料，並加到圖表中 (維持繪圖區 30 個點)
    async function fetchLatestData() {
        try {
            const response = await fetch(`http://localhost:5000/api/data?source=${currentSource}`);
            const json = await response.json();
            
            if (json.status === 'success' && json.data.length > 0) {
                // 從 API 回傳的是 30 筆陣列，最後一個是最新的
                const latest = json.data[json.data.length - 1];
                
                // 如果時間戳跟上次不一樣，代表有新資料
                if (latest.timestamp !== lastTimestamp) {
                    lastTimestamp = latest.timestamp;
                    const time = parseTimestamp(latest.timestamp);
                    const temp = parseFloat(latest.temperature);
                    const humid = parseFloat(latest.humidity);

                    // 動態加入點 (x, y, 重繪, 重繪動畫動態擠掉舊資料[如果超過30點])
                    const shift = chart.series[0].data.length >= 30; 
                    
                    chart.series[0].addPoint([time, temp], true, shift);
                    chart.series[1].addPoint([time, humid], true, shift);
                    
                    document.getElementById('connStatus').className = "badge bg-success status-badge";
                    document.getElementById('connStatus').innerText = "資料接收中 (" + currentSource + ")";
                }
            }
        } catch (error) {
            console.error("更新資料錯誤: ", error);
            document.getElementById('connStatus').className = "badge bg-danger status-badge";
            document.getElementById('connStatus').innerText = "API 斷線";
        }
    }

    // 切換資料來源的事件
    document.getElementById("dataSource").addEventListener("change", function(e) {
        currentSource = e.target.value;
        
        // 清空圖表內資料
        chart.series[0].setData([]);
        chart.series[1].setData([]);
        lastTimestamp = "";

        // 重新載入新的資料與啟動新的排程
        loadInitialData();
    });

    // 頁面載入後初始化
    window.onload = function() {
        Highcharts.setOptions({
            global: {
                useUTC: false // 本地時間顯示
            }
        });
        initChart();
        loadInitialData();

        // 設定每 2 秒抓取一次新資料
        fetchInterval = setInterval(fetchLatestData, 2000);
    };
</script>

</body>
</html>
